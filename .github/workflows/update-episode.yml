name: Actualizar último episodio de Spotify

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

jobs:
  update-episode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Buscar y actualizar el último episodio
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: node scripts/update-episode.js

      - name: Commitear cambios si hay
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Actualiza el último episodio de Spotify automáticamente"
            git push
          else
            echo "Sin cambios para commitear."
          fi
